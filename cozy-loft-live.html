<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Cozy Loft · Shory</title>
<style>
  :root { --ink:#2a2620; --ink-soft:#6e665c; --cream:#f3ece0; --line:#d9cfc0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--cream); color: var(--ink); font-family: Georgia, 'Times New Roman', serif; overflow: hidden; }
  #stage { position: fixed; inset: 0; }
  canvas { display: block; cursor: grab; }
  canvas:active { cursor: grabbing; }

  .ui { position: fixed; pointer-events: none; z-index: 10; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  .ui > * { pointer-events: auto; }

  .caption { top: 24px; left: 28px; color: var(--ink); }
  .caption .eyebrow { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-soft); }
  .caption .title { font-family: Georgia, serif; font-style: italic; font-size: 28px; margin-top: 3px; }

  .chips { top: 24px; right: 28px; display: flex; gap: 8px; }
  .chip { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; padding: 7px 12px; border-radius: 999px; border: 1px solid var(--line); background: rgba(255,255,255,0.75); color: var(--ink-soft); cursor: pointer; transition: all 0.15s; }
  .chip:hover { background: #fff; }
  .chip.active { background: #1a1915; color: var(--cream); border-color: #1a1915; }

  .wall-hint { position: fixed; top: 100px; left: 28px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); background: rgba(255,255,255,0.7); padding: 6px 10px; border-radius: 999px; border: 1px solid var(--line); pointer-events: none; opacity: 0.85; z-index: 10; }

  .scene-card { position: fixed; top: 100px; right: 28px; width: 220px; background: rgba(255,255,255,0.88); backdrop-filter: blur(10px); border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; box-shadow: 0 8px 24px rgba(60,40,20,0.06); z-index: 10; font-family: -apple-system, system-ui, sans-serif; }
  .scene-card .lbl { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 4px; }
  .scene-card .ttl { font-family: Georgia, serif; font-size: 15px; color: var(--ink); margin-bottom: 4px; }
  .scene-card .desc { font-size: 12px; color: var(--ink-soft); line-height: 1.5; }

  .bar { bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 3px; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border: 1px solid var(--line); border-radius: 999px; padding: 5px; box-shadow: 0 10px 30px rgba(60,40,20,0.1); flex-wrap: wrap; max-width: calc(100vw - 48px); justify-content: center; }
  .bar button { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; padding: 7px 13px; border-radius: 999px; border: none; background: none; color: var(--ink); cursor: pointer; white-space: nowrap; transition: background 0.15s; }
  .bar button:hover { background: rgba(0,0,0,0.05); }
  .bar button.on { background: #1a1915; color: var(--cream); }
  .bar .sep { width: 1px; height: 16px; background: var(--line); margin: 0 3px; }

  .hint { bottom: 24px; left: 28px; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-soft); pointer-events: none; }

  @media (max-width: 720px) {
    .scene-card, .wall-hint { display: none; }
    .caption .title { font-size: 20px; }
    .hint { display: none; }
  }
</style>
</head>

  <button class="chip">Isometric</button>

  <div class="ttl" id="sceneTtl">Dog goes for a drive</div>
  <div class="desc" id="sceneDesc">The pup takes his little red car for a spin around the loft. The cat walks her figure-8 on the rug.</div>
</div>

<div class="ui bar">
  <button id="btnDrive" class="on">🚗 Dog drives</button>
  <button id="btnPlay">🎾 They play</button>
  <button id="btnWalk">🐾 Just walk</button>
  <span class="sep"></span>
  <button id="btnRotate" class="on">↻ Auto</button>

  <button id="btnDay">☀ Day</button>
  <button id="btnDusk" class="on">◐ Dusk</button>
  <button id="btnNight">☾ Night</button>

    cam.target.y + cam.radius * Math.cos(cam.phi),
    cam.target.z + cam.radius * Math.sin(cam.phi) * Math.sin(cam.theta)
  );
  camera.lookAt(cam.target);
}

      i % 2 === 0 ? M.leaf : M.leafLt);

    leaf.scale.y = 1.6; leaf.castShadow = true;
    g.add(leaf);
  }
  return g;
}

catEyeL.position.set(0.17, 0.04, -0.09);
catHeadG.add(catEyeL);
const catEyeR = new THREE.Mesh(new THREE.SphereGeometry(0.035, 10, 10), M.eyeGreen);
catEyeR.position.set(0.17, 0.04, 0.09);
catHeadG.add(catEyeR);
const catNoseM = new THREE.Mesh(new THREE.SphereGeometry(0.022, 8, 8), M.catNose);
catNoseM.position.set(0.21, -0.02, 0);
catHeadG.add(catNoseM);

const catLegs = [];
[[0.2,-0.17],[0.2,0.17],[-0.2,-0.17],[-0.2,0.17]].forEach(([lx, lz]) => {
  const legG = new THREE.Group();
  legG.position.set(lx, 0.33, lz);
  const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.33, 8), M.catFur);
  leg.position.y = -0.14; leg.castShadow = true;
  legG.add(leg);
  catBodyG.add(legG);
  catLegs.push(legG);
});

const catTailG = new THREE.Group();
catTailG.position.set(-0.35, 0.55, 0);
catBodyG.add(catTailG);
const tailSegs = [];
for (let i = 0; i < 5; i++) {
  const s = new THREE.Mesh(new THREE.SphereGeometry(0.055, 10, 8), M.catFur);
  s.castShadow = true;
  catTailG.add(s);
  tailSegs.push(s);
}

// ===================================================================
// TOYS: tennis ball + feather toy
// ===================================================================
const ball = new THREE.Mesh(new THREE.SphereGeometry(0.13, 16, 12), M.ball);
ball.castShadow = true;
ball.position.set(0.5, 0.13, 3.2);
scene.add(ball);

const feather = new THREE.Group();
feather.position.set(-1.8, 0.02, 1.8);
scene.add(feather);
const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5, 8),
  new THREE.MeshStandardMaterial({ color:'#8b6440' }));
stick.rotation.z = Math.PI / 2; stick.position.set(0, 0.04, 0);
feather.add(stick);
[[0.22,0.05,0.03,M.featherA],[0.28,0.08,-0.02,M.featherB],[0.24,0.1,0.06,M.featherA]].forEach(([fx,fy,fz,mat]) => {
  const f = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.2, 6), mat);
  f.position.set(fx, fy, fz); f.rotation.z = Math.PI / 2.2;
  feather.add(f);
});

// Dust motes
const dustCount = 100;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(dustCount * 3);
const dustSeed = [];
for (let i = 0; i < dustCount; i++) {
  dustPos[i*3] = (Math.random() - 0.5) * 14;
  dustPos[i*3+1] = Math.random() * 6 + 0.5;
  dustPos[i*3+2] = (Math.random() - 0.5) * 14;
  dustSeed.push(Math.random() * Math.PI * 2);
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dust = new THREE.Points(dustGeo,
  new THREE.PointsMaterial({ color:'#fff3d8', size:0.06, transparent:true, opacity:0.5, sizeAttenuation:true }));
scene.add(dust);

// ===================================================================
// STATE + UI WIRING
// ===================================================================
const state = {
  timeOfDay: 'dusk',
  mode: 'drive',   // 'drive' | 'play' | 'walk'
  autoRotate: true,
  dragging: false, lastX: 0, lastY: 0,
  mouseX: 0.5,     // 0..1 for wall tone
};

function setMode(m) {
  state.mode = m;
  ['Drive','Play','Walk'].forEach((n, i) => {
    const keys = ['drive','play','walk'];
    document.getElementById('btn' + n).classList.toggle('on', state.mode === keys[i]);
  });
  if (m === 'drive') {
    setScene('Dog goes for a drive', 'The pup zooms around the loft in his little red car. Cat watches from the rug.');
  } else if (m === 'play') {
    setScene('They play together', 'Dog chases the ball. Cat chases the dog. Nobody wins.');
  } else {
    setScene('A quiet walk', 'Dog patrols his kingdom. Cat wanders her own route.');
  }
}
function setScene(ttl, desc) {
  document.getElementById('sceneTtl').textContent = ttl;
  document.getElementById('sceneDesc').textContent = desc;
}
function setTimeOfDay(t) {
  state.timeOfDay = t;
  if (t === 'day') {
    ambient.intensity = 0.7; hemi.color.set('#cfe6ff'); hemi.intensity = 0.8;
    sun.color.set('#ffffff'); sun.intensity = 1.5; sun.position.set(-8, 16, 6);
    warmFill.intensity = 0.3; pendant.intensity = 0;
    M.lampBulb.emissiveIntensity = 0; M.lampShade.emissiveIntensity = 0;
    M.headlamp.emissiveIntensity = 0.2;
    scene.background = new THREE.Color('#f3efe6'); scene.fog.color.set('#f3efe6');
    setCap('Midday sun · 12:08', 'Midday sun', 'Bright light pours across the plank floor.');
  } else if (t === 'dusk') {
    ambient.intensity = 0.45; hemi.color.set('#ffd8a8'); hemi.intensity = 0.6;
    sun.color.set('#ffb374'); sun.intensity = 1.1; sun.position.set(-10, 8, 6);
    warmFill.intensity = 0.8; pendant.intensity = 0.4;
    M.lampBulb.emissiveIntensity = 0.3; M.lampShade.emissiveIntensity = 0.1;
    M.headlamp.emissiveIntensity = 0.5;
    scene.background = new THREE.Color('#f3ece0'); scene.fog.color.set('#f3ece0');
    setCap('Golden hour · 17:42', 'Golden hour', 'Low sun through the west windows. Warm air.');
  } else {
    ambient.intensity = 0.18; hemi.color.set('#3a4a6a'); hemi.intensity = 0.35;
    sun.color.set('#4a5a8a'); sun.intensity = 0.2;
    warmFill.intensity = 1.2; pendant.intensity = 1.6;
    M.lampBulb.emissiveIntensity = 1.2; M.lampShade.emissiveIntensity = 0.4;
    M.headlamp.emissiveIntensity = 1.2;
    scene.background = new THREE.Color('#1a1a24'); scene.fog.color.set('#1a1a24');
    setCap('Late night · 23:18', 'Lamp glow', 'Pendant on. Headlights cut through the dark.');
  }
  document.getElementById('btnDay').classList.toggle('on', t === 'day');
  document.getElementById('btnDusk').classList.toggle('on', t === 'dusk');
  document.getElementById('btnNight').classList.toggle('on', t === 'night');
}
function setCap(t, a, d) {
  document.getElementById('cap').textContent = t;
}

// Mouse position drives wall tone
const stageEl = document.getElementById('stage');
stageEl.addEventListener('mousemove', (e) => {
  const rect = stageEl.getBoundingClientRect();
  state.mouseX = (e.clientX - rect.left) / rect.width;
  // Interpolate wall color: cream → warm peach → dusty rose → sage → slate blue
  const stops = [
    { t: 0.00, c: new THREE.Color('#e9dcc7') },
    { t: 0.25, c: new THREE.Color('#e8c8a8') },
    { t: 0.50, c: new THREE.Color('#d8a898') },
    { t: 0.75, c: new THREE.Color('#a8b898') },
    { t: 1.00, c: new THREE.Color('#88a0b8') },
  ];
  const x = Math.max(0, Math.min(1, state.mouseX));
  let a = stops[0], b = stops[stops.length - 1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (x >= stops[i].t && x <= stops[i+1].t) { a = stops[i]; b = stops[i+1]; break; }
  }
  const localT = (x - a.t) / (b.t - a.t);
  const c = a.c.clone().lerp(b.c, localT);
  M.wall.color.copy(c);
});

// Buttons
document.getElementById('btnDrive').onclick = () => setMode('drive');
document.getElementById('btnPlay').onclick = () => setMode('play');
document.getElementById('btnWalk').onclick = () => setMode('walk');
document.getElementById('btnDay').onclick = () => setTimeOfDay('day');
document.getElementById('btnDusk').onclick = () => setTimeOfDay('dusk');
document.getElementById('btnNight').onclick = () => setTimeOfDay('night');
document.getElementById('btnRotate').onclick = () => {
  state.autoRotate = !state.autoRotate;
  document.getElementById('btnRotate').classList.toggle('on', state.autoRotate);
};
document.getElementById('btnReset').onclick = () => {
  cam.theta = Math.PI * 0.28; cam.phi = Math.PI * 0.36; cam.radius = 21;
  applyCam();
};

// Drag to orbit, scroll to zoom
const canvas = renderer.domElement;
function onDown(e) {
  const p = e.touches ? e.touches[0] : e;
  state.dragging = true; state.lastX = p.clientX; state.lastY = p.clientY;
  state.autoRotate = false;
  document.getElementById('btnRotate').classList.remove('on');
}
function onDragMove(e) {
  if (!state.dragging) return;
  const p = e.touches ? e.touches[0] : e;
  const dx = p.clientX - state.lastX;
  const dy = p.clientY - state.lastY;
  state.lastX = p.clientX; state.lastY = p.clientY;
  cam.theta -= dx * 0.006;
  cam.phi = Math.max(0.15, Math.min(1.45, cam.phi - dy * 0.005));
  applyCam();
}
function onUp() { state.dragging = false; }
function onWheel(e) {
  e.preventDefault();
  cam.radius = Math.max(10, Math.min(35, cam.radius + e.deltaY * 0.015));
  applyCam();
}
canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onDragMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, { passive: true });
canvas.addEventListener('touchmove', onDragMove, { passive: true });
canvas.addEventListener('touchend', onUp);
canvas.addEventListener('wheel', onWheel, { passive: false });

window.addEventListener('resize', () => {
  renderer.setSize(W(), H());
  camera.aspect = W()/H();
  camera.updateProjectionMatrix();
});

setTimeOfDay('dusk');
setMode('drive');

// ===================================================================
// PATHS + ANIMATION
// ===================================================================
// Car drives an oval. heading = atan2(dx, dz) convention for Three.js Y-rotation
function carPath(u) {
  const a = 2 * Math.PI * u;
  const x = 0.8 + 3.2 * Math.cos(a);
  const z = 2.2 + 2.2 * Math.sin(a);
  const dx = -3.2 * Math.sin(a);
  const dz = 2.2 * Math.cos(a);
  return { x, z, h: Math.atan2(dx, dz) };
}
// Cat walks a figure-8 on the rug
function catPath(u) {
  const a = 2 * Math.PI * u;
  const x = 1.0 + 1.7 * Math.sin(a * 2);
  const z = 1.0 + 1.4 * Math.sin(a);
  const dx = 3.4 * Math.cos(a * 2);
  const dz = 1.4 * Math.cos(a);
  return { x, z, h: Math.atan2(dx, dz) };
}
// Dog walks a loop (only in 'walk' mode) — rectangular patrol
function dogWalkPath(u) {
  const a = 2 * Math.PI * u;
  const x = -0.5 + 2.8 * Math.cos(a);
  const z = 2.5 + 1.8 * Math.sin(a);
  const dx = -2.8 * Math.sin(a);
  const dz = 1.8 * Math.cos(a);
  return { x, z, h: Math.atan2(dx, dz) };
}

let carU = 0, catU = 0, dogU = 0;
let ballV = { x: 0, y: 0, z: 0 };
let ballLastKick = 0;

const clock = new THREE.Clock();

function tick() {
  const t = clock.getElapsedTime();
  const dt = Math.min(0.05, clock.getDelta());

  if (state.autoRotate) {
    cam.theta += 0.0018;
    applyCam();
  }

  // Dust float
  const arr = dust.geometry.attributes.position.array;
  for (let i = 0; i < dustCount; i++) {
    arr[i*3+1] += Math.sin(t * 0.6 + dustSeed[i]) * 0.002;
    arr[i*3]   += Math.cos(t * 0.4 + dustSeed[i]) * 0.0015;
  }
  dust.geometry.attributes.position.needsUpdate = true;

  // ---------- DRIVE MODE ----------
  if (state.mode === 'drive') {
    carU = (carU + dt * 0.10) % 1;
    const pos = carPath(carU);
    car.position.set(pos.x, 0, pos.z);
    car.rotation.y = pos.h;
    car.visible = true;

    // Spin wheels
    wheels.forEach(w => w.rotation.x -= dt * 8);

    // Dog is IN the car — position him sitting in the driver seat
    dog.visible = true;
    dog.scale.setScalar(0.55);    // smaller so he fits
    dog.position.set(pos.x, 0.35, pos.z);
    dog.rotation.y = pos.h;
    // Reset body rotation so he sits upright
    dogBodyG.rotation.set(0, 0, 0);
    // "Paws on the wheel" — tilt head slightly forward
    dogHeadG.rotation.z = -0.1;
    // Freeze legs (he's sitting, not walking)
    dogLegs.forEach(l => l.rotation.x = 0);
    // Excited tail wag
    dogTailG.rotation.x = Math.sin(t * 10) * 0.8;
    // Ear flap from wind
    dogEarL.rotation.x = -0.3 + Math.sin(t * 5) * 0.15;
    dogEarR.rotation.x = -0.3 + Math.sin(t * 5 + 0.4) * 0.15;

    // Cat walks her figure-8 on the rug
    catU = (catU + dt * 0.06) % 1;
    const cp = catPath(catU);
    cat.visible = true;
    cat.scale.setScalar(0.7);
    cat.position.set(cp.x, 0, cp.z);
    cat.rotation.y = cp.h;
    // Cat walking legs
    const cs = t * 6;
    catLegs[0].rotation.x = Math.sin(cs) * 0.5;
    catLegs[3].rotation.x = Math.sin(cs) * 0.5;
    catLegs[1].rotation.x = -Math.sin(cs) * 0.5;
    catLegs[2].rotation.x = -Math.sin(cs) * 0.5;
    // Tail flick
    tailSegs.forEach((s, i) => {
      const phase = t * 3 + i * 0.5;
      s.position.set(-0.1 * (i+1), 0.05 + i * 0.02, Math.sin(phase) * 0.1);
    });
    catTailG.rotation.y = Math.sin(t * 2) * 0.3;

    ball.visible = false;
    feather.visible = true;
  }
  // ---------- PLAY MODE ----------
  else if (state.mode === 'play') {
    car.visible = false;

    // Dog runs after the ball
    dog.visible = true;
    dog.scale.setScalar(1);
    // Target: wherever the ball is. Chase it.
    const target = ball.position;
    const dogPos = dog.position;
    const dirX = target.x - dogPos.x;
    const dirZ = target.z - dogPos.z;
    const dist = Math.sqrt(dirX * dirX + dirZ * dirZ);
    if (dist > 0.6) {
      const speed = 2.5;
      dog.position.x += (dirX / dist) * speed * dt;
      dog.position.z += (dirZ / dist) * speed * dt;
      dog.rotation.y = Math.atan2(dirX, dirZ);
      // Running legs (opposite diagonals)
      const rs = t * 12;
      dogLegs[0].rotation.x = Math.sin(rs) * 0.8;
      dogLegs[3].rotation.x = Math.sin(rs) * 0.8;
      dogLegs[1].rotation.x = -Math.sin(rs) * 0.8;
      dogLegs[2].rotation.x = -Math.sin(rs) * 0.8;
      // Body bob
      dogBodyG.position.y = Math.abs(Math.sin(rs)) * 0.05;
    } else {
      // Bat the ball
      if (t - ballLastKick > 1.5) {
        ballV.x = (Math.random() - 0.5) * 4;
        ballV.z = (Math.random() - 0.5) * 4;
        ballV.y = 2.5;
        ballLastKick = t;
      }
      dogLegs.forEach(l => l.rotation.x = 0);
      dogBodyG.position.y = 0;
    }
    dogHeadG.rotation.z = Math.sin(t * 2) * 0.15;
    dogTailG.rotation.x = Math.sin(t * 10) * 0.7;
    dogEarL.rotation.x = Math.sin(t * 3) * 0.15;
    dogEarR.rotation.x = Math.sin(t * 3 + 0.4) * 0.15;

    // Ball physics
    ball.visible = true;
    ball.position.x += ballV.x * dt;
    ball.position.z += ballV.z * dt;
    ball.position.y += ballV.y * dt;
    ballV.y -= 9.8 * dt;
    if (ball.position.y < 0.13) {
      ball.position.y = 0.13;
      ballV.y *= -0.55;
      ballV.x *= 0.85;
      ballV.z *= 0.85;
    }
    // Clamp ball inside room
    if (ball.position.x < -5) { ball.position.x = -5; ballV.x = Math.abs(ballV.x); }
    if (ball.position.x > 5) { ball.position.x = 5; ballV.x = -Math.abs(ballV.x); }
    if (ball.position.z < -5) { ball.position.z = -5; ballV.z = Math.abs(ballV.z); }
    if (ball.position.z > 5) { ball.position.z = 5; ballV.z = -Math.abs(ballV.z); }

    // Cat chases the dog (with some distance offset)
    cat.visible = true;
    cat.scale.setScalar(0.85);
    const catTargetX = dog.position.x - Math.sin(dog.rotation.y) * 1.8;
    const catTargetZ = dog.position.z - Math.cos(dog.rotation.y) * 1.8;
    const cdx = catTargetX - cat.position.x;
    const cdz = catTargetZ - cat.position.z;
    const cDist = Math.sqrt(cdx * cdx + cdz * cdz);
    if (cDist > 0.2) {
      const cSpeed = 2.0;
      cat.position.x += (cdx / cDist) * cSpeed * dt;
      cat.position.z += (cdz / cDist) * cSpeed * dt;
      cat.rotation.y = Math.atan2(cdx, cdz);
      const cs = t * 10;
      catLegs[0].rotation.x = Math.sin(cs) * 0.7;
      catLegs[3].rotation.x = Math.sin(cs) * 0.7;
      catLegs[1].rotation.x = -Math.sin(cs) * 0.7;
      catLegs[2].rotation.x = -Math.sin(cs) * 0.7;
    }
    tailSegs.forEach((s, i) => {
      const phase = t * 5 + i * 0.5;
      s.position.set(-0.1 * (i+1), 0.05 + i * 0.02, Math.sin(phase) * 0.15);
    });

    feather.visible = true;
  }
  // ---------- WALK MODE ----------
  else {
    car.visible = false;
    ball.visible = false;
    feather.visible = true;

    // Dog walks slow loop
    dogU = (dogU + dt * 0.04) % 1;
    const dp = dogWalkPath(dogU);
    dog.visible = true;
    dog.scale.setScalar(1);
    dog.position.set(dp.x, 0, dp.z);
    dog.rotation.y = dp.h;
    const ws = t * 4;
    dogLegs[0].rotation.x = Math.sin(ws) * 0.4;
    dogLegs[3].rotation.x = Math.sin(ws) * 0.4;
    dogLegs[1].rotation.x = -Math.sin(ws) * 0.4;
    dogLegs[2].rotation.x = -Math.sin(ws) * 0.4;
    dogBodyG.position.y = Math.abs(Math.sin(ws)) * 0.03;
    dogHeadG.rotation.z = Math.sin(t * 0.9) * 0.08;
    dogTailG.rotation.x = Math.sin(t * 3) * 0.3;
    dogEarL.rotation.x = Math.sin(t * 2) * 0.1;
    dogEarR.rotation.x = Math.sin(t * 2 + 0.5) * 0.1;

    // Cat walks figure-8
    catU = (catU + dt * 0.05) % 1;
    const cp = catPath(catU);
    cat.visible = true;
    cat.scale.setScalar(0.85);
    cat.position.set(cp.x, 0, cp.z);
    cat.rotation.y = cp.h;
    const cs = t * 5;
    catLegs[0].rotation.x = Math.sin(cs) * 0.4;
    catLegs[3].rotation.x = Math.sin(cs) * 0.4;
    catLegs[1].rotation.x = -Math.sin(cs) * 0.4;
    catLegs[2].rotation.x = -Math.sin(cs) * 0.4;
    tailSegs.forEach((s, i) => {
      const phase = t * 2 + i * 0.5;
      s.position.set(-0.1 * (i+1), 0.05 + i * 0.02, Math.sin(phase) * 0.08);
    });
  }

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();
</script>
